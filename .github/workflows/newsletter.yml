name: Newsletter Malaga V4 - Ultra-Exhaustiva

on:
  schedule:
    # --- PROGRAMACIÓN SOLICITADA ---
    # Para mañana (Martes) a las 7:00 AM de España (5:00 AM UTC en verano)
    - cron: '0 5 * * 3'
    # Envío semanal los viernes a las 7:00 AM de España (5:00 AM UTC en verano)
    - cron: '0 5 * * 5'
  workflow_dispatch: # Permite ejecutarlo manualmente para pruebas

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Esta variable es vital para evitar avisos de Node.js en 2026
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Paso 1: Descargar el código de tu repositorio (Versión v4 estable)
      - name: Descargar código
        uses: actions/checkout@v4

      # Paso 2: Configurar el entorno de Python (Versión v5 estable)
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Paso 3: Instalar las librerías necesarias
      - name: Instalar herramientas
        run: |
          python -m pip install --upgrade pip
          pip install -U "google-generativeai>=0.8.0" requests feedparser beautifulsoup4

      # Paso 4: Ejecutar el script híbrido
      - name: Ejecutar programa
        env:
          # Aquí es donde GitHub lee tus "Secrets" guardados en Settings
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python hybrid_newsletter_automation.py

      # Paso 5: Guardar el historial (history.json) en el repositorio
      # Esto es vital para que la "memoria" funcione entre ejecuciones automáticas
      - name: Guardar historial
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json || true
          git commit -m "Actualizar historial de eventos" || true
          git push || true
