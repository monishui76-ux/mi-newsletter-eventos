name: Enviar Newsletter Semanal de Eventos Híbrida

on:
  schedule:
    # Se ejecuta todos los viernes a las 07:00 AM UTC
    - cron: '0 7 * * 5'
  workflow_dispatch: # Permite ejecutarlo manualmente para pruebas

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Esta variable elimina los avisos de Node.js en 2026
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Paso 1: Descargar el código
      - name: Descargar código
        uses: actions/checkout@v4

      # Paso 2: Configurar el entorno de Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Paso 3: Instalar las librerías necesarias (Versión 2026)
      - name: Instalar herramientas
        run: |
          python -m pip install --upgrade pip
          pip install -U "google-generativeai>=0.8.0" requests feedparser beautifulsoup4

      # Paso 4: Ejecutar el script híbrido
      - name: Ejecutar programa
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python hybrid_newsletter_automation.py
